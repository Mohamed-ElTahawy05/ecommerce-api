<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories | ShopLux Admin</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0a0a0a;
      --sidebar-bg: #111111;
      --card-bg: #1a1a1a;
      --border-color: rgba(255, 255, 255, 0.1);
      
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      
      --success: #22c55e;
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.5);
      
      --font-ui: 'Inter', sans-serif;
      --font-mono: 'Geist Mono', monospace;
      
      --transition: all 0.2s ease;
      --sidebar-width: 250px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { font-family: var(--font-ui); background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* SIDEBAR */
    .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; height: 100vh; transition: var(--transition); z-index: 100; }
    .brand { padding: 1.5rem; display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 1.25rem; letter-spacing: -0.02em; border-bottom: 1px solid var(--border-color); }
    .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #818cf8); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    .nav-links { flex: 1; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.75rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 8px; transition: var(--transition); font-weight: 500; font-size: 0.95rem; }
    .nav-item svg { width: 18px; height: 18px; fill: currentColor; }
    .nav-item:hover, .nav-item.active { color: var(--text-main); background-color: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--accent); background-color: rgba(99, 102, 241, 0.1); position: relative; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 25%; height: 50%; width: 3px; background-color: var(--accent); border-radius: 0 4px 4px 0; }
    .user-profile { padding: 1.5rem 1rem; border-top: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background-color: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; }
    .user-role { font-size: 0.75rem; color: var(--text-muted); }
    .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: var(--transition); }
    .logout-btn:hover { color: var(--danger); background-color: var(--danger-bg); }

    /* MAIN CONTENT */
    .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 2rem 3rem; transition: var(--transition); }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .page-title { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
    
    .btn { height: 40px; padding: 0 1rem; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); font-family: var(--font-ui); }
    .btn-primary { background-color: var(--accent); color: white; }
    .btn-primary:hover { background-color: var(--accent-hover); }
    .btn-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .btn-danger:hover { background-color: var(--danger); color: white; }
    .btn-icon { width: 32px; height: 32px; padding: 0; align-items: center; justify-content: center; background: none; border: 1px solid transparent; color: var(--text-muted); cursor: pointer; border-radius: 6px; transition: var(--transition); }
    .btn-icon:hover { color: var(--text-main); background-color: rgba(255,255,255,0.1); }

    /* GRID LAYOUT */
    .categories-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; align-items: start; }
    .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
    .card-header { padding: 1.5rem; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 1.1rem; }
    .card-body { padding: 1.5rem; }

    /* FORM */
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .form-label { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
    .form-input { width: 100%; height: 40px; background-color: rgba(255,255,255,0.02); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); padding: 0 1rem; font-family: var(--font-ui); transition: var(--transition); }
    .form-input:focus { outline: none; border-color: var(--accent); background-color: var(--card-bg); }
    .form-input[readonly] { background-color: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed; border-color: transparent; }

    /* TABLE */
    .table-responsive { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 1rem 1.5rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.02); }
    td { padding: 1rem 1.5rem; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background-color: rgba(255,255,255,0.02); }
    .td-mono { font-family: var(--font-mono); }
    .slug-badge { display: inline-flex; padding: 0.25rem 0.5rem; background-color: rgba(255,255,255,0.05); border-radius: 4px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); border: 1px solid var(--border-color); }

    /* SKELETON LOADERS */
    @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
    .skeleton { animation: shimmer 2s infinite linear; background: linear-gradient(to right, rgba(255,255,255,0.05) 4%, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.05) 36%); background-size: 1000px 100%; border-radius: 4px; }
    .skeleton-text { height: 1em; width: 100%; margin: 4px 0; }

    /* TOASTS */
    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 9999; }
    .toast { background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 16px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); min-width: 250px; }
    .toast.show { transform: translateX(0); }
    .toast-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .toast.success .toast-icon { color: var(--success); }
    .toast.error .toast-icon { color: var(--danger); }
    .toast-content { flex: 1; font-size: 0.85rem; font-weight: 500; }

    @media (max-width: 1024px) {
      .categories-layout { grid-template-columns: 1fr; }
    }
    
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width: 250px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 1.5rem; }
      .mobile-menu-btn { display: block; margin-right: 1rem; }
      .page-header { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-icon">S</div>
      <span>ShopLux Panel</span>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard
      </a>
      <a href="products.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M21 16V8.02c0-.51-.25-.98-.67-1.2l-8-4a1.44 1.44 0 00-1.32 0l-8 4C2.59 7.04 2.34 7.51 2.34 8.02V16c0 .51.25.98.67 1.2l8 4c.2.1.42.15.66.15s.46-.05.66-.15l8-4c.42-.22.67-.69.67-1.2zM12 4.41l6.73 3.36-2.5 1.25L9.5 5.66 12 4.41zm0 15.62l-7-3.5V9.45l7 3.5v7.08zm1-8.58l-7-3.5 2.5-1.25 7 3.5-2.5 1.25z"/></svg> Products
      </a>
      <a href="orders.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 9h-2V7h-2v5H6v2h2v5h2v-5h2v-2z"/></svg> Orders
      </a>
      <a href="categories.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M5 16h3v3H5v-3zm9-11h-3v3h3V5zm0 11h-3v3h3v-3zm0-5.5h-3v3h3v-3zm5.5-5.5h-3v3h3v-3zm0 5.5h-3v3h3v-3zm0 5.5h-3v3h3v-3zM5 10.5h3v3H5v-3zM5 5h3v3H5V5z"/></svg> Categories
      </a>
    </nav>
    <div class="user-profile">
      <div class="avatar" id="sidebar-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Admin User</div>
        <div class="user-role">Administrator</div>
      </div>
      <button class="logout-btn" onclick="logout()" title="Logout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" style="display:none;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      </button>
      <h1 class="page-title">Categories</h1>
    </header>

    <div class="categories-layout">
      <!-- LEFt: ADD FORM -->
      <div class="card">
        <div class="card-header">Add New Category</div>
        <div class="card-body">
          <form id="category-form" onsubmit="createCategory(event)">
            <div class="form-group">
              <label class="form-label" for="cat-name">Name *</label>
              <input type="text" id="cat-name" class="form-input" required onkeyup="updateSlug()">
            </div>
            <div class="form-group">
              <label class="form-label" for="cat-slug">Slug (Auto-generated)</label>
              <input type="text" id="cat-slug" class="form-input" readonly placeholder="my-category">
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Add Category</button>
          </form>
        </div>
      </div>

      <!-- RIGHT: DATA TABLE -->
      <div class="card">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Category Name</th>
                <th>Slug</th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="categories-tbody">
              <!-- Skeletons -->
              <tr><td colspan="3"><div class="skeleton skeleton-text" style="height:24px"></div></td></tr>
              <tr><td colspan="3"><div class="skeleton skeleton-text" style="height:24px"></div></td></tr>
              <tr><td colspan="3"><div class="skeleton skeleton-text" style="height:24px"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>
  <script src="js/admin-dashboard.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = JSON.parse(localStorage.getItem("user") || "{}");
      if (user.name) {
        document.getElementById("sidebar-name").textContent = user.name;
        document.getElementById("sidebar-avatar").textContent = user.name.charAt(0).toUpperCase();
      }

      await loadCategories();
    });

    // Generate slug from name
    function updateSlug() {
      const name = document.getElementById("cat-name").value;
      const slug = name.toLowerCase()
                       .trim()
                       .replace(/[\s\W-]+/g, '-') // replace non-word chars with -
                       .replace(/^-+|-+$/g, '');  // remove leading/trailing -
      document.getElementById("cat-slug").value = slug;
    }

    async function loadCategories() {
      renderSkeletons();
      try {
        const categories = await adminFetch("/categories");
        renderTable(categories);
      } catch (err) {
        showToast(err.message, "error");
        document.getElementById("categories-tbody").innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--danger);padding:2rem;">Error loading data</td></tr>';
      }
    }

    function renderSkeletons() {
      const tbody = document.getElementById("categories-tbody");
      tbody.innerHTML = '';
      for(let i=0; i<4; i++) {
        tbody.innerHTML += `<tr><td colspan="3"><div class="skeleton skeleton-text" style="height:24px"></div></td></tr>`;
      }
    }

    function renderTable(categories) {
      const tbody = document.getElementById("categories-tbody");
      tbody.innerHTML = "";

      if(!categories || categories.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-muted);padding:2rem;">No categories found</td></tr>';
        return;
      }

      // Sort alphabetically
      categories.sort((a,b) => (a.name || '').localeCompare(b.name || ''));

      categories.forEach(c => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="font-weight: 500;">${c.name}</td>
          <td><span class="slug-badge">${c.slug}</span></td>
          <td style="text-align: right;">
            <button class="btn-icon" onclick="deleteCategory('${c._id}')" title="Delete Category" style="color:var(--danger)">
              <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function createCategory(e) {
      e.preventDefault();
      
      const name = document.getElementById("cat-name").value;
      const slug = document.getElementById("cat-slug").value;
      const btn = document.getElementById("submit-btn");

      btn.disabled = true;
      btn.textContent = "Adding...";

      try {
        await adminFetch("/categories", {
          method: 'POST',
          body: JSON.stringify({ name, slug })
        });
        showToast("Category created successfully", "success");
        document.getElementById("category-form").reset();
        await loadCategories();
      } catch (err) {
        showToast(err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Add Category";
      }
    }

    async function deleteCategory(id) {
      if(!confirm("Are you sure you want to delete this category?\nProducts using this category might be affected.")) return;
      
      try {
        await adminFetch(`/categories/${id}`, { method: 'DELETE' });
        showToast("Category deleted successfully", "success");
        await loadCategories();
      } catch (err) {
        showToast(err.message, "error");
      }
    }

    function toggleSidebar() { document.getElementById("sidebar").classList.toggle("open"); }
  </script>
</body>
</html>
