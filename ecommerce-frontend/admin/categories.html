<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — Admin — ShopLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 flex-shrink-0 h-screen sticky top-0 border-r border-white/10 flex flex-col p-5">
    <a href="../index.html" class="flex items-center gap-2.5 mb-8">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
        <i class="fa-solid fa-bolt text-sm text-white"></i>
      </div>
      <span class="text-lg font-bold">Shop<span class="text-indigo-400">Lux</span></span>
    </a>
    <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-indigo-600/10 border border-indigo-500/20 mb-6">
      <i class="fa-solid fa-shield-halved text-indigo-400 text-sm"></i>
      <span class="text-xs font-semibold text-indigo-300 uppercase tracking-wider">Admin Panel</span>
    </div>
    <nav class="space-y-1 flex-1">
      <a href="index.html" class="admin-sidebar-link"><i class="fa-solid fa-chart-line w-4"></i> Dashboard</a>
      <a href="products.html" class="admin-sidebar-link"><i class="fa-solid fa-box w-4"></i> Products</a>
      <a href="orders.html" class="admin-sidebar-link"><i class="fa-solid fa-receipt w-4"></i> Orders</a>
      <a href="categories.html" class="admin-sidebar-link active"><i class="fa-solid fa-tag w-4"></i> Categories</a>
    </nav>
    <div class="mt-auto pt-4 border-t border-white/10 space-y-1">
      <a href="../index.html" class="admin-sidebar-link"><i class="fa-solid fa-store w-4"></i> View Store</a>
      <button onclick="logout()" class="admin-sidebar-link text-red-400 hover:text-red-300 w-full text-left"><i class="fa-solid fa-right-from-bracket w-4"></i> Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-auto">
    <header class="sticky top-0 z-10 bg-[#0a0a0a]/80 backdrop-blur border-b border-white/10 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">Categories</h1>
        <p class="text-xs text-white/40">Manage product categories</p>
      </div>
      <button onclick="openCreateModal()" class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold transition-all">
        <i class="fa-solid fa-plus"></i> Add Category
      </button>
    </header>

    <div class="p-8">
      <div class="rounded-2xl bg-white/5 border border-white/10 overflow-hidden">
        <table class="w-full admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Slug</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="categories-body">
            <tr><td colspan="3" class="text-center py-8 text-white/30"><i class="fa-solid fa-spinner animate-spin mr-2"></i>Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- CREATE MODAL -->
  <div id="create-modal" class="hidden modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold">Add Category</h2>
        <button onclick="closeModal()" class="w-8 h-8 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
          <i class="fa-solid fa-times text-sm"></i>
        </button>
      </div>
      <form id="create-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Category Name</label>
          <input id="cat-name" type="text" placeholder="e.g. Electronics" required
            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Slug</label>
          <input id="cat-slug" type="text" placeholder="electronics (auto-generated)" 
            class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          <p class="text-xs text-white/30 mt-1">Leave blank to auto-generate from name</p>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition-all">Cancel</button>
          <button type="submit" id="create-btn" class="flex-1 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-sm font-semibold transition-all">
            Create Category
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE CONFIRM -->
  <div id="delete-modal" class="hidden modal-overlay">
    <div class="modal-box text-center max-w-sm">
      <div class="w-14 h-14 rounded-2xl bg-red-500/20 flex items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-trash text-red-400 text-xl"></i>
      </div>
      <h3 class="text-lg font-bold mb-2">Delete Category</h3>
      <p class="text-white/50 text-sm mb-6">Are you sure? This action cannot be undone.</p>
      <div class="flex gap-3">
        <button onclick="document.getElementById('delete-modal').classList.add('hidden')" class="flex-1 py-3 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition-all">Cancel</button>
        <button id="confirm-delete-btn" class="flex-1 py-3 rounded-xl bg-red-600 hover:bg-red-500 text-sm font-semibold transition-all">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      loadCategories();
    });

    async function loadCategories() {
      const tbody = document.getElementById('categories-body');
      try {
        const cats = await adminGetCategories();
        const list = Array.isArray(cats) ? cats : (cats.data || []);
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-white/30">No categories yet. Create one!</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(cat => `
          <tr>
            <td class="font-semibold">${cat.name}</td>
            <td class="font-mono text-xs text-white/50">${cat.slug}</td>
            <td>
              <button onclick="deleteCategory('${cat._id}', '${cat.name.replace(/'/g,"\\'")}')
              " class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-red-500/15 hover:bg-red-500/30 text-red-400 text-xs font-medium transition-all">
                <i class="fa-solid fa-trash text-xs"></i> Delete
              </button>
            </td>
          </tr>`).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center py-8 text-red-400">Failed to load categories</td></tr>';
      }
    }

    // Auto-generate slug from name
    document.getElementById('cat-name')?.addEventListener('input', (e) => {
      const slugEl = document.getElementById('cat-slug');
      if (!slugEl.dataset.manual) {
        slugEl.value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      }
    });
    document.getElementById('cat-slug')?.addEventListener('input', (e) => {
      e.target.dataset.manual = e.target.value ? 'true' : '';
    });

    function openCreateModal() {
      document.getElementById('create-modal').classList.remove('hidden');
    }
    function closeModal() {
      document.getElementById('create-modal').classList.add('hidden');
      document.getElementById('create-form').reset();
      delete document.getElementById('cat-slug').dataset.manual;
    }

    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('cat-name').value.trim();
      const slug = document.getElementById('cat-slug').value.trim() || name.toLowerCase().replace(/\s+/g, '-');
      const btn = document.getElementById('create-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Creating...';
      btn.disabled = true;
      try {
        await adminCreateCategory(name, slug);
        showToast('Category created!', 'success');
        closeModal();
        loadCategories();
      } catch (err) {
        showToast(err.response?.data?.message || 'Failed to create category', 'error');
      } finally {
        btn.innerHTML = 'Create Category';
        btn.disabled = false;
      }
    });

    let deletingId = null;
    function deleteCategory(id, name) {
      deletingId = id;
      document.getElementById('delete-modal').classList.remove('hidden');
    }
    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!deletingId) return;
      const btn = document.getElementById('confirm-delete-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i>';
      btn.disabled = true;
      try {
        await adminDeleteCategory(deletingId);
        showToast('Category deleted', 'success');
        document.getElementById('delete-modal').classList.add('hidden');
        loadCategories();
      } catch (err) {
        showToast(err.response?.data?.message || 'Failed to delete', 'error');
      } finally {
        btn.innerHTML = 'Delete';
        btn.disabled = false;
        deletingId = null;
      }
    });
  </script>
</body>
</html>
