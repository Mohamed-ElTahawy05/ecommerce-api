<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — ShopLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 flex-shrink-0 h-screen sticky top-0 border-r border-white/10 flex flex-col p-5">
    <a href="../index.html" class="flex items-center gap-2.5 mb-8">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
        <i class="fa-solid fa-bolt text-sm text-white"></i>
      </div>
      <span class="text-lg font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
    </a>

    <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-indigo-600/10 border border-indigo-500/20 mb-6">
      <i class="fa-solid fa-shield-halved text-indigo-400 text-sm"></i>
      <span class="text-xs font-semibold text-indigo-300 uppercase tracking-wider">Admin Panel</span>
    </div>

    <nav class="space-y-1 flex-1">
      <a href="index.html" class="admin-sidebar-link active">
        <i class="fa-solid fa-chart-line w-4"></i> Dashboard
      </a>
      <a href="products.html" class="admin-sidebar-link">
        <i class="fa-solid fa-box w-4"></i> Products
      </a>
      <a href="orders.html" class="admin-sidebar-link">
        <i class="fa-solid fa-receipt w-4"></i> Orders
      </a>
      <a href="categories.html" class="admin-sidebar-link">
        <i class="fa-solid fa-tag w-4"></i> Categories
      </a>
    </nav>

    <div class="mt-auto pt-4 border-t border-white/10 space-y-1">
      <a href="../index.html" class="admin-sidebar-link">
        <i class="fa-solid fa-store w-4"></i> View Store
      </a>
      <button onclick="logout()" class="admin-sidebar-link text-red-400 hover:text-red-300 w-full text-left">
        <i class="fa-solid fa-right-from-bracket w-4"></i> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-auto">
    <!-- Top bar -->
    <header class="sticky top-0 z-10 bg-[#0a0a0a]/80 backdrop-blur border-b border-white/10 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">Dashboard</h1>
        <p class="text-xs text-white/40">Overview of your store</p>
      </div>
      <div id="admin-user" class="flex items-center gap-3 text-sm text-white/60">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold">A</div>
      </div>
    </header>

    <div class="p-8 space-y-8">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">
        <div class="rounded-2xl bg-white/5 border border-white/10 p-5 hover:border-indigo-500/30 transition-all">
          <div class="flex items-center justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-indigo-600/20 flex items-center justify-center">
              <i class="fa-solid fa-box text-indigo-400"></i>
            </div>
            <span class="text-xs text-green-400 font-semibold px-2 py-0.5 bg-green-500/10 rounded-full">Active</span>
          </div>
          <p class="text-3xl font-black" id="stat-products">—</p>
          <p class="text-sm text-white/40 mt-1">Total Products</p>
        </div>
        <div class="rounded-2xl bg-white/5 border border-white/10 p-5 hover:border-indigo-500/30 transition-all">
          <div class="flex items-center justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-purple-600/20 flex items-center justify-center">
              <i class="fa-solid fa-receipt text-purple-400"></i>
            </div>
          </div>
          <p class="text-3xl font-black" id="stat-orders">—</p>
          <p class="text-sm text-white/40 mt-1">Total Orders</p>
        </div>
        <div class="rounded-2xl bg-white/5 border border-white/10 p-5 hover:border-indigo-500/30 transition-all">
          <div class="flex items-center justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-green-600/20 flex items-center justify-center">
              <i class="fa-solid fa-dollar-sign text-green-400"></i>
            </div>
          </div>
          <p class="text-3xl font-black" id="stat-revenue">—</p>
          <p class="text-sm text-white/40 mt-1">Total Revenue</p>
        </div>
        <div class="rounded-2xl bg-white/5 border border-white/10 p-5 hover:border-indigo-500/30 transition-all">
          <div class="flex items-center justify-between mb-4">
            <div class="w-10 h-10 rounded-xl bg-yellow-600/20 flex items-center justify-center">
              <i class="fa-solid fa-clock text-yellow-400"></i>
            </div>
          </div>
          <p class="text-3xl font-black" id="stat-pending">—</p>
          <p class="text-sm text-white/40 mt-1">Pending Orders</p>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="rounded-2xl bg-white/5 border border-white/10 overflow-hidden">
        <div class="px-6 py-4 border-b border-white/10 flex items-center justify-between">
          <h2 class="font-bold">Recent Orders</h2>
          <a href="orders.html" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">View all →</a>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full admin-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Shipping Address</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recent-orders-body">
              <tr><td colspan="6" class="text-center py-8 text-white/30"><i class="fa-solid fa-spinner animate-spin mr-2"></i>Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      const user = getUser();
      if (user) {
        const el = document.getElementById('admin-user');
        el.innerHTML = `<span>${user.name}</span><div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold">${user.name[0].toUpperCase()}</div>`;
      }

      try {
        const { totalProducts, totalOrders, revenue, orders } = await loadDashboardStats();
        const pending = orders.filter(o => o.status?.toLowerCase() === 'pending').length;

        document.getElementById('stat-products').textContent = totalProducts;
        document.getElementById('stat-orders').textContent = totalOrders;
        document.getElementById('stat-revenue').textContent = formatPrice(revenue);
        document.getElementById('stat-pending').textContent = pending;

        const tbody = document.getElementById('recent-orders-body');
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-white/30">No orders yet</td></tr>';
          return;
        }
        tbody.innerHTML = orders.slice(0, 10).map(order => {
          const date = new Date(order.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          return `<tr>
            <td class="font-mono text-xs text-indigo-400">#${order._id?.slice(-8).toUpperCase()}</td>
            <td>${order.user?.name || 'N/A'}</td>
            <td class="max-w-[200px] truncate text-white/50 text-xs">${order.shippingAddress || '—'}</td>
            <td class="font-bold">${formatPrice(order.totalPrice || 0)}</td>
            <td>${statusBadge(order.status)}</td>
            <td class="text-white/40 text-xs">${date}</td>
          </tr>`;
        }).join('');
      } catch (err) {
        console.error(err);
        showToast('Failed to load dashboard data', 'error');
      }
    });
  </script>
</body>
</html>
