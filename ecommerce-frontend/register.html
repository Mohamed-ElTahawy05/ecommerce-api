<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ShopLux</title>
  <meta name="description" content="Join ShopLux. Create your free account and start shopping today." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="hero-blob w-96 h-96 bg-indigo-600/15 -top-20 -right-20"></div>
  <div class="hero-blob w-72 h-72 bg-purple-600/10 bottom-10 left-10" style="animation-delay:2s"></div>
  <!-- ─── TOP NOTIFICATION BAR ────────────────────── -->
  <div id="top-notification-bar" class="hidden bg-indigo-600 text-white text-sm font-medium py-2 px-4 relative z-[60] transition-all duration-300">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex-1 text-center truncate" id="notification-message">
        <!-- Message will be injected here -->
      </div>
      <button id="close-notification" class="ml-4 hover:text-white/80 transition-colors" aria-label="Dismiss notification">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-bolt text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
      </a>
      <h1 class="text-3xl font-black mb-2">Create your account</h1>
      <p class="text-white/50">Join thousands of happy shoppers</p>
    </div>

    <div class="glass rounded-3xl p-8 shadow-2xl">
      <form id="register-form" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Full Name</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="name" type="text" placeholder="John Doe" required
              class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="email" type="email" placeholder="you@example.com" required
              class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="password" type="password" placeholder="Min. 6 characters" required minlength="6"
              class="w-full pl-11 pr-11 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
            <button type="button" id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
              <i class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
          <!-- Password strength -->
          <div id="pw-strength" class="mt-2 h-1 rounded-full bg-white/10 overflow-hidden">
            <div id="pw-strength-bar" class="h-full rounded-full transition-all duration-300 w-0 bg-red-500"></div>
          </div>
          <p id="pw-strength-text" class="text-xs text-white/30 mt-1"></p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Confirm Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="confirm-password" type="password" placeholder="Repeat your password" required
              class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
        </div>

        <div id="register-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></div>

        <button type="submit" id="register-btn" class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-sm transition-all shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40 hover:-translate-y-0.5 mt-2">
          Create Account <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <p class="text-center text-sm text-white/50 mt-6">
        Already have an account?
        <a href="login.html" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ─── Top Notification Bar ──────────────────────────────────────────────────
    const initNotificationBar = () => {
      if (localStorage.getItem('topBarDismissed') === 'true') return;
      
      const bar = document.getElementById('top-notification-bar');
      const msgEl = document.getElementById('notification-message');
      const closeBtn = document.getElementById('close-notification');
      
      const messages = [
        "🎉 Free shipping on orders over $50",
        "✨ New arrivals every week"
      ];
      let currentMsgIdx = 0;

      bar.classList.remove('hidden');

      const rotateMessage = () => {
        msgEl.style.opacity = 0;
        setTimeout(() => {
          msgEl.textContent = messages[currentMsgIdx];
          msgEl.style.opacity = 1;
          currentMsgIdx = (currentMsgIdx + 1) % messages.length;
        }, 300); // Wait for fade out
      };

      rotateMessage(); // Show first message immediately
      const rotationInterval = setInterval(rotateMessage, 5000); // Rotate every 5 seconds

      closeBtn.addEventListener('click', () => {
        bar.classList.add('hidden');
        localStorage.setItem('topBarDismissed', 'true');
        clearInterval(rotationInterval);
      });
      
      // Add a style to msgEl for transition
      msgEl.style.transition = 'opacity 0.3s ease';
    };

    window.addEventListener('DOMContentLoaded', () => {
      if (isLoggedIn()) {
        window.location.href = 'index.html';
      }
      initNotificationBar();
    });

    // Password toggle
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const ico = document.querySelector('#toggle-pw i');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      ico.classList.toggle('fa-eye'); ico.classList.toggle('fa-eye-slash');
    });

    // Password strength
    document.getElementById('password').addEventListener('input', (e) => {
      const val = e.target.value;
      const bar = document.getElementById('pw-strength-bar');
      const text = document.getElementById('pw-strength-text');
      let strength = 0;
      if (val.length >= 6) strength++;
      if (val.length >= 10) strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^a-zA-Z0-9]/.test(val)) strength++;

      const levels = ['', 'Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
      const colors = ['', 'bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500', 'bg-emerald-400'];
      const widths = [0, 20, 40, 60, 80, 100];

      bar.className = `h-full rounded-full transition-all duration-300 ${colors[strength] || 'bg-red-500'}`;
      bar.style.width = `${widths[strength] || 0}%`;
      text.textContent = strength > 0 ? levels[strength] : '';
      text.className = `text-xs mt-1 ${strength >= 3 ? 'text-green-400' : 'text-white/30'}`;
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('register-error');
      errorEl.classList.add('hidden');

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('register-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Creating account...';
      btn.disabled = true;

      try {
        await register(name, email, password);
        showToast('Account created! Welcome to ShopLux 🎉', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      } catch (err) {
        const msg = err.response?.data?.message || 'Registration failed. Try again.';
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        btn.innerHTML = 'Create Account <i class="fa-solid fa-arrow-right"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
