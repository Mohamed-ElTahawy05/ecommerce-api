<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ShopLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="hero-blob w-96 h-96 bg-indigo-600/15 top-0 left-0"></div>
  <div class="bg-grid absolute inset-0 opacity-30"></div>

  <!-- ─── TOP NOTIFICATION BAR ────────────────────── -->
  <div id="top-notification-bar" class="hidden bg-indigo-600 text-white text-sm font-medium py-2 px-4 relative z-[60] transition-all duration-300">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex-1 text-center truncate" id="notification-message">
        <!-- Message will be injected here -->
      </div>
      <button id="close-notification" class="ml-4 hover:text-white/80 transition-colors" aria-label="Dismiss notification">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-bolt text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
      </a>
      <div class="w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center mx-auto mb-5">
        <i class="fa-solid fa-lock-open text-indigo-400 text-2xl"></i>
      </div>
      <h1 class="text-3xl font-black mb-2">Set new password</h1>
      <p class="text-white/50">Make it strong and memorable.</p>
    </div>

    <div id="invalid-token" class="hidden glass rounded-3xl p-8 text-center">
      <i class="fa-solid fa-triangle-exclamation text-yellow-400 text-4xl mb-4"></i>
      <h3 class="font-bold text-lg mb-2">Invalid or Expired Link</h3>
      <p class="text-white/50 text-sm mb-6">This reset link is no longer valid. Please request a new one.</p>
      <a href="forgot-password.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-sm transition-all">
        Request New Link
      </a>
    </div>

    <div id="form-view" class="glass rounded-3xl p-8 shadow-2xl">
      <form id="reset-form" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">New Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="new-password" type="password" placeholder="Min. 6 characters" required minlength="6"
              class="w-full pl-11 pr-11 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
            <button type="button" id="toggle-pw1" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
              <i class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Confirm New Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="confirm-password" type="password" placeholder="Repeat your password" required
              class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
        </div>
        <div id="reset-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></div>
        <button type="submit" id="reset-btn" class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-sm transition-all shadow-lg shadow-indigo-500/20 hover:-translate-y-0.5">
          Reset Password <i class="fa-solid fa-check"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ─── Top Notification Bar ──────────────────────────────────────────────────
    const initNotificationBar = () => {
      if (localStorage.getItem('topBarDismissed') === 'true') return;
      
      const bar = document.getElementById('top-notification-bar');
      const msgEl = document.getElementById('notification-message');
      const closeBtn = document.getElementById('close-notification');
      
      const messages = [
        "🎉 Free shipping on orders over $50",
        "✨ New arrivals every week"
      ];
      let currentMsgIdx = 0;

      bar.classList.remove('hidden');

      const rotateMessage = () => {
        msgEl.style.opacity = 0;
        setTimeout(() => {
          msgEl.textContent = messages[currentMsgIdx];
          msgEl.style.opacity = 1;
          currentMsgIdx = (currentMsgIdx + 1) % messages.length;
        }, 300); // Wait for fade out
      };

      rotateMessage(); // Show first message immediately
      const rotationInterval = setInterval(rotateMessage, 5000); // Rotate every 5 seconds

      closeBtn.addEventListener('click', () => {
        bar.classList.add('hidden');
        localStorage.setItem('topBarDismissed', 'true');
        clearInterval(rotationInterval);
      });
      
      // Add a style to msgEl for transition
      msgEl.style.transition = 'opacity 0.3s ease';
    };

    window.addEventListener('DOMContentLoaded', () => {
      initNotificationBar();
    });

    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('invalid-token').classList.remove('hidden');
    }

    document.getElementById('toggle-pw1').addEventListener('click', () => {
      const inp = document.getElementById('new-password');
      const ico = document.querySelector('#toggle-pw1 i');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      ico.classList.toggle('fa-eye'); ico.classList.toggle('fa-eye-slash');
    });

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('reset-error');
      errorEl.classList.add('hidden');

      const pw = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (pw !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Resetting...';
      btn.disabled = true;

      try {
        await resetPassword(token, pw);
        showToast('Password reset successfully!', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      } catch (err) {
        const msg = err.response?.data?.message || 'Reset failed. Link may have expired.';
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        btn.innerHTML = 'Reset Password <i class="fa-solid fa-check"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
