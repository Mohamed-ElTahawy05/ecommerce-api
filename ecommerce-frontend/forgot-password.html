<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ShopLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="hero-blob w-96 h-96 bg-indigo-600/15 -top-20 left-1/4"></div>
  <div class="bg-grid absolute inset-0 opacity-30"></div>

  <div class="relative z-10 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-bolt text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
      </a>
      <div class="w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 flex items-center justify-center mx-auto mb-5">
        <i class="fa-solid fa-key text-indigo-400 text-2xl"></i>
      </div>
      <h1 class="text-3xl font-black mb-2">Forgot password?</h1>
      <p class="text-white/50 max-w-sm mx-auto">Enter your email and we'll send you a reset link.</p>
    </div>

    <div class="glass rounded-3xl p-8 shadow-2xl">
      <div id="form-view">
        <form id="forgot-form" class="space-y-5">
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Email Address</label>
            <div class="relative">
              <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
              <input id="email" type="email" placeholder="you@example.com" required
                class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
            </div>
          </div>
          <div id="forgot-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></div>
          <button type="submit" id="forgot-btn" class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-sm transition-all shadow-lg shadow-indigo-500/20 hover:-translate-y-0.5">
            Send Reset Link <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>

      <!-- Success view -->
      <div id="success-view" class="hidden text-center py-4">
        <div class="w-16 h-16 rounded-2xl bg-green-500/20 border border-green-500/30 flex items-center justify-center mx-auto mb-5">
          <i class="fa-solid fa-envelope-circle-check text-green-400 text-2xl"></i>
        </div>
        <h3 class="font-bold text-lg mb-2">Check your email</h3>
        <p class="text-white/50 text-sm mb-6">We've sent a password reset link to your email address.</p>
        <a href="login.html" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-sm transition-all">
          Back to Login <i class="fa-solid fa-arrow-right"></i>
        </a>
      </div>

      <p class="text-center text-sm text-white/50 mt-6">
        Remember it? <a href="login.html" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('forgot-error');
      errorEl.classList.add('hidden');
      const btn = document.getElementById('forgot-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Sending...';
      btn.disabled = true;
      try {
        await forgotPassword(document.getElementById('email').value.trim());
        document.getElementById('form-view').classList.add('hidden');
        document.getElementById('success-view').classList.remove('hidden');
      } catch (err) {
        const msg = err.response?.data?.message || 'Failed to send reset email.';
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        btn.innerHTML = 'Send Reset Link <i class="fa-solid fa-paper-plane"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
