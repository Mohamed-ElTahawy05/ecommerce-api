<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — ShopLux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">

  <!-- NAVBAR -->
  <header id="navbar" class="navbar-blur fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
            <i class="fa-solid fa-bolt text-sm text-white"></i>
          </div>
          <span class="text-lg font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
        </a>
        <nav class="hidden md:flex items-center gap-1">
          <a href="index.html" class="px-4 py-2 rounded-xl text-sm text-white/60 hover:text-white hover:bg-white/5">Home</a>
          <a href="products.html" class="px-4 py-2 rounded-xl text-sm text-white/60 hover:text-white hover:bg-white/5">Products</a>
        </nav>
        <div class="flex items-center gap-3">
          <a href="cart.html" class="relative p-2.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all group">
            <i class="fa-solid fa-cart-shopping text-white/70 group-hover:text-white transition-colors"></i>
            <span id="cart-count" class="hidden absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-indigo-600 text-xs font-bold flex items-center justify-center">0</span>
          </a>
          <div id="nav-auth" class="flex items-center gap-2"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- PROFILE HEADER -->
  <div class="pt-24 pb-8 relative overflow-hidden border-b border-white/10">
    <div class="hero-blob w-64 h-64 bg-indigo-600/10 top-0 right-0 opacity-50"></div>
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-5">
        <div id="profile-avatar" class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-2xl font-black shadow-lg shadow-indigo-500/30 flex-shrink-0">
          ?
        </div>
        <div>
          <h1 id="profile-name-display" class="text-2xl font-black">My Account</h1>
          <p id="profile-email-display" class="text-white/50 text-sm"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Tabs -->
    <div class="flex gap-1 mb-8 p-1 rounded-xl bg-white/5 border border-white/10 w-fit">
      <button onclick="switchTab('info')" id="tab-info" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold transition-all bg-indigo-600 text-white">
        <i class="fa-solid fa-user mr-1.5"></i> Account Info
      </button>
      <button onclick="switchTab('password')" id="tab-password" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold transition-all text-white/50 hover:text-white">
        <i class="fa-solid fa-lock mr-1.5"></i> Password
      </button>
      <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn px-5 py-2 rounded-lg text-sm font-semibold transition-all text-white/50 hover:text-white">
        <i class="fa-solid fa-box mr-1.5"></i> My Orders
      </button>
    </div>

    <!-- Tab: Account Info -->
    <div id="panel-info" class="tab-panel">
      <div class="rounded-2xl bg-white/5 border border-white/10 p-6">
        <h2 class="font-bold text-lg mb-6">Update Profile</h2>
        <form id="profile-form" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Full Name</label>
            <input id="pf-name" type="text" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Email Address</label>
            <input id="pf-email" type="email" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
          <button type="submit" id="pf-btn" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-sm transition-all">
            <i class="fa-solid fa-floppy-disk"></i> Save Changes
          </button>
        </form>
      </div>
    </div>

    <!-- Tab: Password -->
    <div id="panel-password" class="tab-panel hidden">
      <div class="rounded-2xl bg-white/5 border border-white/10 p-6">
        <h2 class="font-bold text-lg mb-6">Change Password</h2>
        <form id="password-form" class="space-y-4 max-w-md">
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Current Password</label>
            <input id="pw-current" type="password" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm input-glow transition-all" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">New Password</label>
            <input id="pw-new" type="password" required minlength="6" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm input-glow transition-all" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Confirm New Password</label>
            <input id="pw-confirm" type="password" required class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm input-glow transition-all" />
          </div>
          <button type="submit" id="pw-btn" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-semibold text-sm transition-all">
            <i class="fa-solid fa-shield-halved"></i> Update Password
          </button>
        </form>
      </div>
    </div>

    <!-- Tab: Orders -->
    <div id="panel-orders" class="tab-panel hidden">
      <div id="orders-container">
        <div class="skeleton h-20 rounded-2xl mb-3"></div>
        <div class="skeleton h-20 rounded-2xl mb-3"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth()) return;
      updateNavbarAuth();
      await updateCartCount();

      // Pre-fill profile
      const user = getUser();
      if (user) {
        document.getElementById('pf-name').value = user.name || '';
        document.getElementById('pf-email').value = user.email || '';
        document.getElementById('profile-name-display').textContent = user.name || 'My Account';
        document.getElementById('profile-email-display').textContent = user.email || '';
        document.getElementById('profile-avatar').textContent = (user.name || 'U')[0].toUpperCase();
      }

      // Load orders
      loadOrders();
    });

    function switchTab(name) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.remove('bg-indigo-600', 'text-white');
        b.classList.add('text-white/50');
      });
      document.getElementById(`panel-${name}`).classList.remove('hidden');
      const btn = document.getElementById(`tab-${name}`);
      btn.classList.add('bg-indigo-600', 'text-white');
      btn.classList.remove('text-white/50');
    }

    // Profile update
    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('pf-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Saving...';
      btn.disabled = true;
      try {
        await updateProfile(
          document.getElementById('pf-name').value.trim(),
          document.getElementById('pf-email').value.trim()
        );
        showToast('Profile updated successfully!', 'success');
        const user = getUser();
        document.getElementById('profile-name-display').textContent = user.name;
        document.getElementById('profile-avatar').textContent = (user.name || 'U')[0].toUpperCase();
        updateNavbarAuth();
      } catch (err) {
        showToast(err.response?.data?.message || 'Failed to update profile', 'error');
      } finally {
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
        btn.disabled = false;
      }
    });

    // Password update
    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw = document.getElementById('pw-new').value;
      const confirm = document.getElementById('pw-confirm').value;
      if (newPw !== confirm) { showToast('Passwords do not match', 'error'); return; }
      const btn = document.getElementById('pw-btn');
      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Updating...';
      btn.disabled = true;
      try {
        await updatePassword(document.getElementById('pw-current').value, newPw);
        showToast('Password updated!', 'success');
        document.getElementById('password-form').reset();
      } catch (err) {
        showToast(err.response?.data?.message || 'Failed to update password', 'error');
      } finally {
        btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Update Password';
        btn.disabled = false;
      }
    });

    // Orders
    async function loadOrders() {
      const container = document.getElementById('orders-container');
      try {
        const res = await api.get('/orders/my');
        const orders = res.data.data || res.data || [];
        if (orders.length === 0) {
          container.innerHTML = `
            <div class="text-center py-16">
              <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-white/5 flex items-center justify-center">
                <i class="fa-solid fa-box-open text-3xl text-white/20"></i>
              </div>
              <h3 class="text-white/50 font-semibold mb-2">No orders yet</h3>
              <a href="products.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-xl text-sm font-semibold transition-all mt-2">
                Start Shopping
              </a>
            </div>`;
          return;
        }

        const statusColors = {
          pending:'bg-yellow-500/15 border-yellow-500/30 text-yellow-400',
          processing:'bg-blue-500/15 border-blue-500/30 text-blue-400',
          shipped:'bg-indigo-500/15 border-indigo-500/30 text-indigo-400',
          delivered:'bg-green-500/15 border-green-500/30 text-green-400',
          cancelled:'bg-red-500/15 border-red-500/30 text-red-400',
        };

        container.innerHTML = orders.map(order => {
          const status = order.status?.toLowerCase() || 'pending';
          const colorClass = statusColors[status] || statusColors.pending;
          const date = new Date(order.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          return `
            <div class="rounded-2xl bg-white/5 border border-white/10 p-5 hover:border-indigo-500/30 transition-all mb-3">
              <div class="flex items-start justify-between flex-wrap gap-3">
                <div>
                  <p class="font-semibold text-sm">Order <span class="text-indigo-400 font-mono">#${order._id?.slice(-8).toUpperCase()}</span></p>
                  <p class="text-xs text-white/40 mt-1">${date} · ${order.orderItems?.length || 0} item(s)</p>
                  <p class="text-xs text-white/40 mt-1 truncate max-w-xs">${order.shippingAddress || '—'}</p>
                </div>
                <div class="text-right flex flex-col items-end gap-2">
                  <span class="px-3 py-1 rounded-full border text-xs font-semibold ${colorClass} capitalize">${order.status || 'Pending'}</span>
                  <span class="font-bold text-indigo-400">${formatPrice(order.totalPrice || 0)}</span>
                </div>
              </div>
            </div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm">Failed to load orders.</p>`;
      }
    }
  </script>
</body>
</html>
