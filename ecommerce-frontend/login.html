<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShopLux</title>
  <meta name="description" content="Sign in to your ShopLux account." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:'#6366f1'},fontFamily:{sans:['Inter','sans-serif']}}}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/custom.css" />
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <div class="hero-blob w-96 h-96 bg-indigo-600/15 -top-20 -left-20"></div>
  <div class="hero-blob w-72 h-72 bg-purple-600/10 bottom-10 right-10" style="animation-delay:2s"></div>
  <div class="bg-grid absolute inset-0 opacity-30"></div>

  <div class="relative z-10 w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5 mb-6">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
          <i class="fa-solid fa-bolt text-white"></i>
        </div>
        <span class="text-xl font-bold tracking-tight">Shop<span class="text-indigo-400">Lux</span></span>
      </a>
      <h1 class="text-3xl font-black mb-2">Welcome back</h1>
      <p class="text-white/50">Sign in to your account</p>
    </div>

    <div class="glass rounded-3xl p-8 shadow-2xl">

      <!-- Google Sign In -->
      <a href="https://ecommerce-api-psi-three.vercel.app/api/auth/google"
        class="w-full flex items-center justify-center gap-3 py-3.5 rounded-xl bg-white hover:bg-gray-100 text-gray-800 font-semibold text-sm transition-all shadow-lg mb-5">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" />
        Continue with Google
      </a>

      <!-- Divider -->
      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-xs text-white/30 font-medium">or sign in with email</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider mb-2">Email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="email" type="email" placeholder="you@example.com" required
              class="w-full pl-11 pr-4 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="block text-xs font-semibold text-white/50 uppercase tracking-wider">Password</label>
            <a href="forgot-password.html" class="text-xs text-indigo-400 hover:text-indigo-300 transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/30 text-sm"></i>
            <input id="password" type="password" placeholder="••••••••" required
              class="w-full pl-11 pr-11 py-3.5 rounded-xl bg-white/5 border border-white/15 focus:border-indigo-500 outline-none text-sm placeholder-white/30 input-glow transition-all" />
            <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors">
              <i class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <div id="login-error" class="hidden text-sm text-red-400 bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3"></div>

        <button type="submit" id="login-btn" class="w-full flex items-center justify-center gap-3 py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-sm transition-all shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40 hover:-translate-y-0.5 mt-2">
          Sign In <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <p class="text-center text-sm text-white/50 mt-6">
        Don't have an account?
        <a href="register.html" class="text-indigo-400 font-semibold hover:text-indigo-300 transition-colors">Create one free</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'index.html';

    // Handle Google OAuth callback
    const urlParams = new URLSearchParams(window.location.search);
    const googleToken = urlParams.get('token');
    const googleUser = urlParams.get('user');
    const googleError = urlParams.get('error');

    if (googleToken && googleUser) {
        localStorage.setItem('token', googleToken);
        localStorage.setItem('user', decodeURIComponent(googleUser));
        showToast('Welcome! Signed in with Google 🎉', 'success');
        const user = JSON.parse(decodeURIComponent(googleUser));
        setTimeout(() => {
            window.location.href = user?.role === 'admin' ? 'admin/index.html' : 'index.html';
        }, 1000);
    }

    if (googleError) {
        showToast('Google sign in failed. Please try again.', 'error');
    }

    document.getElementById('toggle-password').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const ico = document.getElementById('toggle-password').querySelector('i');
      if (inp.type === 'password') {
        inp.type = 'text';
        ico.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password';
        ico.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      errorEl.classList.add('hidden');

      btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Signing in...';
      btn.disabled = true;

      try {
        const data = await login(
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        showToast('Welcome back! 👋', 'success');
        const user = getUser();
        setTimeout(() => {
          window.location.href = (user?.role === 'admin') ? 'admin/index.html' : 'index.html';
        }, 1000);
      } catch (err) {
        const msg = err.response?.data?.message || 'Invalid credentials. Please try again.';
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
        btn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
